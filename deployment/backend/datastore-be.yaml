apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-backend
  labels:
    type: backend
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      type: backend

  template:
    metadata:
      labels:
        type: backend

    spec:
      containers:
        - name: datastore-backend
          image: 634107240549.dkr.ecr.us-east-1.amazonaws.com/datastore:v47.0
          imagePullPolicy: Always

          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlHost

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlUname

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datastore-be-secret
                  key: mysqlPassword

          resources:
            requests:
              cpu: 100m
              memory: "500Mi"
            limits:
              cpu: 1
              memory: "1Gi"

          ports:
            - containerPort: 8084

          # ✅ FIXED PROBES
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 10

---

apiVersion: v1
kind: Service
metadata:
  name: datastore-backend-svc
  namespace: backend
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/scrape: "true"
spec:
  selector:
    type: backend

  ports:
    - port: 8081
      targetPort: 8084
